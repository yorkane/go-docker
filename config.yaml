# =============================================================================
# yourapp Configuration
# =============================================================================

# Application settings
app:
  name: yourapp
  version: dev

# Logging configuration
log:
  level: info        # debug, info, warn, error
  format: json       # json, console

# HTTP Server configuration
server:
  port: 8080
  graceful_shutdown: 30s
  read_timeout: 10s
  write_timeout: 30s
  idle_timeout: 120s

# Health check settings
health:
  liveness_delay: 5s
  readiness_delay: 5s
